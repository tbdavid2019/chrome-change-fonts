<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <title>Font Changer</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    *, *::before, *::after {
      box-sizing: border-box;
    }
    body {
      width: 320px;
      margin: 0;
      padding: 16px;
      background: #f8f9fb;
      color: #1f2933;
    }
    .topbar {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 8px;
    }
    .lang-toggle {
      border: 1px solid #c7d2fe;
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 11px;
      line-height: 1;
      cursor: pointer;
      background: #fff;
      color: #4338ca;
    }
    .lang-toggle:hover {
      background: #eef2ff;
    }
    h1 {
      margin: 0 0 4px;
      font-size: 18px;
    }
    p.description {
      margin: 0 0 16px;
      font-size: 12px;
      color: #4b5563;
    }
    label {
      font-size: 13px;
      display: block;
      margin-bottom: 6px;
      color: #111827;
    }
    select {
      width: 100%;
      padding: 8px;
      border-radius: 8px;
      border: 1px solid #d1d5db;
      margin-bottom: 12px;
      font-size: 13px;
      background: #fff;
    }
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .toggle-row label {
      margin: 0;
      display: flex;
      align-items: center;
      gap: 6px;
      font-weight: 600;
    }
    .site-toggle-row {
      align-items: flex-start;
      gap: 8px;
    }
    .site-badge {
      max-width: 116px;
      flex-shrink: 0;
      padding: 4px 8px;
      border-radius: 999px;
      background: #eef2ff;
      color: #3730a3;
      font-size: 11px;
      line-height: 1.2;
      text-align: right;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .status-text {
      font-size: 12px;
      color: #6b7280;
      margin-bottom: 12px;
    }
    .preview-card {
      background: #fff;
      border-radius: 12px;
      border: 1px solid #e5e7eb;
      padding: 12px;
      box-shadow: 0 2px 6px rgba(15, 23, 42, 0.08);
      margin-bottom: 12px;
    }
    .preview-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 13px;
      font-weight: 600;
      color: #374151;
    }
    button {
      border: none;
      border-radius: 8px;
      padding: 4px 10px;
      font-size: 12px;
      cursor: pointer;
      background: #e0e7ff;
      color: #4338ca;
    }
    button:hover {
      background: #c7d2fe;
    }
    textarea {
      width: 100%;
      min-height: 80px;
      resize: vertical;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      padding: 8px;
      font-size: 18px;
      line-height: 1.5;
      background: #f9fafb;
      color: inherit;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }
    .hint {
      font-size: 11px;
      color: #6b7280;
      margin: 0;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <button type="button" class="lang-toggle" id="languageToggle">EN/中</button>
  </div>
  <header>
    <h1 id="headingText">Font Changer</h1>
    <p class="description" id="descriptionText">
      Choose a system font, preview the result, then apply it to the current tab.
    </p>
  </header>

  <main>
    <label for="fontSelect" id="fontLabel">Font</label>
    <select id="fontSelect"></select>

    <div class="toggle-row">
      <label id="toggleLabel">
        <input type="checkbox" id="enableCheckbox">
        <span id="toggleLabelText">Enable font replacement</span>
      </label>
    </div>

    <div class="toggle-row site-toggle-row">
      <label id="siteToggleLabel">
        <input type="checkbox" id="siteDisableCheckbox">
        <span id="siteDisableLabelText">Disable on this site</span>
      </label>
      <span class="site-badge" id="siteBadge">-</span>
    </div>

    <div class="status-text" id="statusText">Font replacement is disabled.</div>

    <section class="preview-card">
      <div class="preview-header">
        <span id="previewTitle">Live preview</span>
        <button type="button" id="resetButton">Reset</button>
      </div>
      <textarea id="previewInput" spellcheck="false" wrap="soft" aria-label="Font preview text"></textarea>
    </section>
  </main>

  <p class="hint" id="hintText">
    Tip: the preview uses the same font stack applied to websites for accurate results.
  </p>

  <script src="popup.js"></script>
</body>
</html>
